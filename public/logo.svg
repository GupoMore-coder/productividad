<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#d4bc8f" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="transparent" />

  <!-- Monogram M & G Integration -->
  <!-- Outer G-like Ring -->
  <path d="M 256 60 A 160 160 0 1 0 416 220 L 416 256" fill="none" stroke="url(#gold_grad)" stroke-width="12" stroke-linecap="round" />
  <circle cx="256" cy="220" r="140" fill="none" stroke="url(#gold_grad)" stroke-width="2" opacity="0.3" />
  
  <!-- Monogram M -->
  <path d="M 176 300 L 176 170 L 256 250 L 336 170 L 336 300" fill="none" stroke="url(#gold_grad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Accent Line -->
  <path d="M 226 330 L 286 330" fill="none" stroke="url(#gold_grad)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Typography -->
  <text x="256" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="6">GRUPO MORE</text>
  <text x="256" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#d4bc8f" text-anchor="middle" letter-spacing="10">REGALOS AUTÉNTICOS</text>
</svg>
